version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: solarhome_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: solarhome
      POSTGRES_PASSWORD: solarhome_secret
      POSTGRES_DB: solarhome
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solarhome -d solarhome"]
      interval: 10s
      timeout: 5s
      retries: 10

  seed:
    build: ./db
    container_name: solarhome_seed
    environment:
      DATABASE_URL: postgres://solarhome:solarhome_secret@db:5432/solarhome
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  simulator:
    build: ./simulator
    container_name: solarhome_simulator
    environment:
      DATABASE_URL: postgres://solarhome:solarhome_secret@db:5432/solarhome
    depends_on:
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  timescale_data: